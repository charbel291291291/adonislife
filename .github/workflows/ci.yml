name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  editmode-tests:
    name: EditMode tests and validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Adonis Life/Library
          key: library-${{ hashFiles('Adonis Life/Packages/packages-lock.json') }}
          restore-keys: library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Adonis Life
          testMode: EditMode
          unityVersion: 6000.4.9f1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts
